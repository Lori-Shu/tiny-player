name: Build Linux Version

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ] # 当 PR 目标分支是 main 时触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 关键优化：设置 Docker Buildx（支持缓存导出/导入）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 利用 GitHub Actions 缓存 Docker 镜像层
      # 这能解决你讨厌的“每次进入都要下载大依赖”的问题
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and Push (Local Export)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.linux
          tags: tiny_player:latest
          outputs: type=docker,dest=/tmp/tiny_player.tar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Load Image and Extract Binary
        run: |
          docker load -i /tmp/tiny_player.tar
          docker create --name build_cont tiny_player:latest
          docker cp build_cont:/app/target/release/tiny_player ./tiny_player
          docker rm build_cont

      # 优化缓存：更新旧缓存
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache